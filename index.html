DOCTYPE html>
<html>
<head>
<title>AI Internship Recommender</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#4facfe,#00f2fe);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.container{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
width:350px;
text-align:center;
}

h1{
color:#333;
}

input,select{
width:90%;
padding:10px;
margin:10px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
background:#4facfe;
color:white;
padding:10px 20px;
border:none;
border-radius:5px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#0077ff;
}

.result{
margin-top:20px;
background:#f2f8ff;
padding:10px;
border-radius:5px;
}

</style>

</head>

<body>

<div class="container">

<h1>AI Internship Finder</h1>

<form method="POST">

<input type="text" name="skills" placeholder="Enter your skills">

<input type="text" name="interest" placeholder="Career Interest">

<select name="level">
<option>beginner</option>
<option>intermediate</option>
<option>advanced</option>
</select>

<button type="submit">Find Internship</button>

</form>

<div class="result">

<h3>Recommended Internships</h3>

{% for r in rec %}
<p>{{r}}</p>
{% endfor %}

</div>

</div>

</body>
</html>
